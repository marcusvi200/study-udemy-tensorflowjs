<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TensorFlow JS</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script src="/node_modules/@tensorflow/tfjs/dist/tf.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-sm bg-warning navbar-primary">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link navbar-brand text-white" href="#">TensorFlow</a>
            </li>
        </ul>
        <div class="navbar-text mx-auto">
            <h4>Inteligência Artificial com JavaScript e TensorFlow.js</h4>
        </div>
    </nav>

    <div class="container mt-2">
        <img src="img/tensorflow.svg" width="150" class="float-end" alt="TensorFlowJS">
        <h5>02 - Funções de Criação</h5>
        <span class="badge text-bg-secondary"></span>
        <div class="mt-2">
            <textarea rows="12" name="result" id="result" class="form-control"></textarea>
        </div>

        <div class="row my-2">
            <div class="col-12 d-none" id="multiAction">
                <select class="form-select" aria-label="Default select example">
                    <option selected disabled>Selecione uma ação disponível</option>
                </select>
            </div>
            <div class="col-12 my-2">
                <button class="btn btn-lg btn-warning" name="action">Executar</button>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
    <!-- Primeiro tópico -->
    <script src="js/action-01.js"></script>

    <!-- Segundo tópico -->
    <script src="js/action-02.js"></script>

    <!-- Terceiro tópico -->
    <script src="js/action-03.js"></script>

    <!-- Quarto tópico -->
    <script src="js/action-04.js"></script>

</body>

</html>
