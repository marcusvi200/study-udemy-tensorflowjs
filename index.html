<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TechF8 - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            overflow-x: hidden;
        }

        #sidebar-wrapper {
            min-height: 100vh;
            width: 350px;
            transition: margin .25s ease-out;
        }

        #page-content-wrapper {
            min-width: 100vw;
        }

        /* Ajuste para telas grandes */
        @media (min-width: 768px) {
            #page-content-wrapper {
                min-width: 0;
                width: 100%;
            }
        }

        .nav-link {
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .nav-link:hover {
            background-color: #f8f9fa;
            color: #0d6efd !important;
        }

        .nav-link.active {
            background-color: #0d6efd;
            color: white !important;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 20px);
            border: none;
        }
    </style>
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="bg-white border-end" id="sidebar-wrapper">
            <div class="sidebar-heading border-bottom p-3 fw-bold">Conteúdo do Curso</div>
            <div class="list-group list-group-flush p-2" id="menu-container">
            </div>
        </div>

        <div id="page-content-wrapper" class="bg-light">
            <div class="container-fluid p-0 m-0">
                <iframe id="content-frame" src="about:blank"></iframe>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            // 1. Variável de configuração dos itens (Fácil de expandir)
            const menuItems = [
                { label: "01 - Construção do Tensor", path: "/01-Construção do Tensor" },
                { label: "02 - Funções de Criação", path: "/02-Funções de Criação" },
                { label: "03 - Manipulação de Classes", path: "/03-Manipulação de Classes" },
                { label: "04 - Manipulação de Elementos", path: "/04-Manipulação de Elementos" }
            ];

            // 2. Injeção Dinâmica do Menu
            const $container = $('#menu-container');
            menuItems.forEach((item, index) => {
                const $btn = $('<a>', {
                    class: 'nav-link list-group-item list-group-item-action border-0',
                    text: item.label,
                    'data-path': item.path
                });
                $container.append($btn);
            });

            // 3. Evento de Clique para carregar o Frame
            $('.nav-link').on('click', function () {
                const path = $(this).data('path');

                // Atualiza visual do menu
                $('.nav-link').removeClass('active');
                $(this).addClass('active');

                // Carrega o caminho no Iframe
                $('#content-frame').attr('src', path);

                // No Mobile, fecha o menu ao clicar (opcional)
                if ($(window).width() < 768) {
                    $("#wrapper").toggleClass("toggled");
                }
            });

            // 4. Toggle do Sidebar (Responsividade)
            $("#sidebarToggle").click(function (e) {
                e.preventDefault();
                $("#sidebar-wrapper").toggle(); // Simples toggle
            });
        });
    </script>
</body>

</html>
